[supervisord]
nodaemon=true

[program:ml_heating_backend]
command=python3 -m src.main
directory=/app
autostart=true
autorestart=true
stderr_logfile=/data/logs/ml_heating_backend.err.log
stdout_logfile=/data/logs/ml_heating_backend.out.log

[program:dashboard]
command=streamlit run dashboard/app.py --server.port=3002 --server.headless=true
directory=/app
autostart=true
autorestart=true
stderr_logfile=/data/logs/dashboard.err.log
stdout_logfile=/data/logs/dashboard.out.log
