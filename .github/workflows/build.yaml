name: Build and Push Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jhilkert90-wq/ml_heating_underfloor

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CONFIG="ml_heating_underfloor/config.yaml"
          CURRENT=$(grep '^version:' "$CONFIG" | sed 's/version: *[\"]*\([^\"]*\)[\"]*$/\1/' | tr -d ' ')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse patch version from '${CURRENT}'"
            exit 1
          fi
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/^version: *\"*${CURRENT}\"*/version: \"${NEW_VERSION}\"/" "$CONFIG"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${CURRENT} -> ${NEW_VERSION}"

      - name: Sync changelog to addon
        id: sync_changelog
        env:
          ADDON_CHANGELOG: ml_heating_underfloor/CHANGELOG.md
          MAIN_CHANGELOG: CHANGELOG.md
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          python3 <<'PY'
          import os
          from datetime import date
          from pathlib import Path

          addon_changelog = Path(os.environ["ADDON_CHANGELOG"])
          main_changelog = Path(os.environ["MAIN_CHANGELOG"])
          new_version = os.environ["NEW_VERSION"]
          today = date.today().isoformat()

          def set_output(name: str, value: str) -> None:
              with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
                  fh.write(f"{name}={value}\n")

          main_lines = main_changelog.read_text(encoding="utf-8").splitlines()

          try:
              unreleased_index = main_lines.index("## [Unreleased]")
          except ValueError:
              print("No [Unreleased] section found in main CHANGELOG.md — skipping addon changelog update.")
              set_output("changelog_updated", "false")
              raise SystemExit(0)

          next_version_index = len(main_lines)
          for i in range(unreleased_index + 1, len(main_lines)):
              if main_lines[i].startswith("## ["):
                  next_version_index = i
                  break

          unreleased_lines = main_lines[unreleased_index + 1:next_version_index]
          unreleased_body = "\n".join(unreleased_lines).strip()

          if not unreleased_body:
              print("No [Unreleased] entries found in main CHANGELOG.md — skipping addon changelog update.")
              set_output("changelog_updated", "false")
              raise SystemExit(0)

          addon_lines = addon_changelog.read_text(encoding="utf-8").splitlines()
          title = addon_lines[0] if addon_lines else "# Changelog - ML Heating Underfloor"
          rest_lines = addon_lines[1:]
          while rest_lines and rest_lines[0] == "":
              rest_lines.pop(0)

          new_addon_lines = [
              title,
              "",
              f"## [{new_version}] - {today}",
              "",
              *unreleased_body.splitlines(),
              "",
          ]
          if rest_lines:
              new_addon_lines.extend(rest_lines)
          addon_changelog.write_text("\n".join(new_addon_lines).rstrip() + "\n", encoding="utf-8")

          new_main_lines = main_lines[:unreleased_index + 1] + [""] + main_lines[next_version_index:]
          main_changelog.write_text("\n".join(new_main_lines).rstrip() + "\n", encoding="utf-8")

          print(f"Moved [Unreleased] entries into addon changelog version {new_version} and reset root [Unreleased].")
          set_output("changelog_updated", "true")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml_heating_underfloor/config.yaml
          if [ "${{ steps.sync_changelog.outputs.changelog_updated }}" = "true" ]; then
            git add CHANGELOG.md
            git add ml_heating_underfloor/CHANGELOG.md
          fi
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

  build:
    runs-on: ubuntu-latest
    needs: bump-version
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ needs.bump-version.outputs.version }}" ]]; then
            echo "version=${{ needs.bump-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep '^version:' ml_heating_underfloor/config.yaml | sed 's/version: *[\"]*\([^\"]*\)[\"]*$/\1/' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_DESCRIPTION=ML Heating Underfloor
            BUILD_NAME=ML Heating Underfloor
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
