name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jhilkert90-wq/ml_heating_underfloor

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CONFIG="ml_heating_underfloor/config.yaml"
          CURRENT=$(grep '^version:' "$CONFIG" | sed 's/version: *[\"]*\([^\"]*\)[\"]*$/\1/' | tr -d ' ')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse patch version from '${CURRENT}'"
            exit 1
          fi
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/^version: *\"*${CURRENT}\"*/version: \"${NEW_VERSION}\"/" "$CONFIG"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${CURRENT} -> ${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml_heating_underfloor/config.yaml
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

  build:
    runs-on: ubuntu-latest
    needs: bump-version
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ needs.bump-version.outputs.version }}" ]]; then
            echo "version=${{ needs.bump-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep '^version:' ml_heating_underfloor/config.yaml | sed 's/version: *[\"]*\([^\"]*\)[\"]*$/\1/' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_DESCRIPTION=ML Heating Underfloor
            BUILD_NAME=ML Heating Underfloor
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
